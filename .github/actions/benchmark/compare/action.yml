name: Ecosystem Benchmark Compare

inputs:
  event-name:
    required: true
    description: 'GitHub event name (push or workflow_dispatch)'
  commit-sha:
    required: true
    description: 'Current commit SHA; its parent is used as base when event is push'
  github-token:
    required: true
    description: 'GitHub token for API access in the compare CLI'

outputs:
  diff-result:
    description: 'Benchmark comparison result with newlines replaced by @@'
    value: ${{ steps.compare.outputs.diff-result }}

runs:
  using: composite
  steps:
    - name: Resolve compare base
      id: resolve-base
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        github-token: ${{ inputs.github-token }}
        result-encoding: string
        script: |
          if ('${{ inputs.event-name }}' === 'push') {
            // Use the parent commit SHA so that re-runs of older workflows compare
            // against the correct baseline rather than the latest main.
            const { data } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ inputs.commit-sha }}'
            })
            return data.parents[0].sha
          }
          // For workflow_dispatch (PR benchmark), use the merge base of main and the PR head
          // so the comparison reflects only the PR's own changes, regardless of main drift.
          // If the author merges main into their branch beforehand, the merge base shifts
          // accordingly and the result reflects the merged outcome.
          const { data } = await github.rest.repos.compareCommitsWithBasehead({
            owner: context.repo.owner,
            repo: context.repo.repo,
            basehead: `main...${{ inputs.commit-sha }}`
          })
          return data.merge_base_commit.sha

    - name: Run compare
      id: compare
      shell: bash
      working-directory: ${{ github.workspace }}/rspack-ecosystem-benchmark
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        result=$(node bin/cli.js compare --base ${{ steps.resolve-base.outputs.result }} --current current)
        echo "$result"
        echo "diff-result=${result//$'\n'/'@@'}" >> $GITHUB_OUTPUT
