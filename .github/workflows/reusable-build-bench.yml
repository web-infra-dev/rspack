name: Reusable Release

on:
  workflow_call:
    inputs:
      measurement:
        required: false
        type: string
        default: 'simulation'
      target:
        required: true
        type: string
      runner: # Runner labels
        required: true
        type: string
      ref: # Git reference to checkout
        required: false
        type: string
env:
  # Since CI builds are more akin to from-scratch builds, incremental compilation adds unnecessary dependency-tracking and IO overhead, reducing caching effectiveness.
  # https://github.com/rust-lang/rust-analyzer/blob/25368d24308d6a94ffe8b99f0122bcf5a2175322/.github/workflows/ci.yaml#L11
  CARGO_INCREMENTAL: 0

permissions:
  # Allow commenting on issues
  issues: write

jobs:
  bench:
    name: 'Bench ${{ inputs.measurement }}'
    runs-on: ${{ fromJSON(inputs.runner) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.ref }}
          clean: ${{ runner.environment == 'github-hosted' }}

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-if: true
          key: build-bench-${{ inputs.target }}

      - name: Install cargo-codspeed binary
        uses: taiki-e/install-action@dfcb1ee29051d97c8d0f2d437199570008fd5612 # v2
        with:
          tool: cargo-codspeed@4.4.1

      - name: Download bindings
        uses: ./.github/actions/artifact/download
        with:
          name: bindings-${{ inputs.target }}
          path: crates/node_binding/

      - name: Show restored binding
        run: ls -lah crates/node_binding/*.node

      - name: Download benches
        uses: ./.github/actions/artifact/download
        with:
          # reuse the same artifact name for both walltime and simulation since they share the same benchmark binaries, just in different paths.
          name: codspeed-${{ inputs.measurement == 'walltime' && 'walltime' || 'simulation' }}-${{ inputs.target }}
          path: target/codspeed/

      - name: Show Codspeed
        run: |
          ls -Rl target/codspeed/
          if [ "${{ inputs.measurement }}" != "walltime" ]; then
            chmod +x target/codspeed/analysis/rspack_benchmark/benches
          fi
          if [ "${{ inputs.measurement }}" = "walltime" ]; then
            chmod +x target/codspeed/walltime/rspack_benchmark/benches
          fi

      - name: Pnpm Setup
        timeout-minutes: 5
        uses: ./.github/actions/pnpm/setup

      - name: Pnpm Install
        uses: ./.github/actions/pnpm/install-dependencies

      - name: Build JS
        run: pnpm run build:js
      - name: Run benchmark (simulation)
        if: inputs.measurement == 'simulation'
        uses: ./.github/actions/codspeed
        timeout-minutes: 30
        env:
          RAYON_NUM_THREADS: 1
        with:
          mode: 'simulation'
          run: pnpm run bench:ci
          token: ${{ secrets.CODSPEED_TOKEN }}
          runner-version: 4.12.1

      - name: Run benchmark (memory)
        if: inputs.measurement == 'memory'
        uses: ./.github/actions/codspeed
        timeout-minutes: 30
        env:
          RAYON_NUM_THREADS: 1
        with:
          mode: 'memory'
          # Prepare benchcases because bench:rust expects them even in memory mode.
          # add some comment
          run: pnpm run bench:prepare && pnpm run bench:rust
          token: ${{ secrets.CODSPEED_TOKEN }}
          runner-version: 4.12.1
      - name: Run benchmark (walltime)
        if: inputs.measurement == 'walltime'
        uses: ./.github/actions/codspeed
        timeout-minutes: 30
        with:
          mode: 'walltime'
          # Prepare benchcases before running the Rust walltime benchmarks directly.
          run: pnpm run bench:prepare && pnpm run bench:rust
          token: ${{ secrets.CODSPEED_TOKEN }}
          runner-version: 4.12.1
