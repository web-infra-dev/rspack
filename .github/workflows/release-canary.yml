name: Release Canary

on:
  schedule:
    - cron: '0 17 * * *'

  workflow_dispatch:
    inputs:
      commit:
        required: true
        type: string
        description: 'Commit SHA'
      test:
        required: false
        type: boolean
        default: false
        description: 'Run tests'
      profile:
        required: true
        type: choice
        default: release
        options:
          - release
          - profiling
          - ci
          - debug
        description: 'profiling means release with debug info for profiling, ci means release with debug info and faster build time'

permissions:
  # To publish packages with provenance
  id-token: write
  # Allow commenting on issues for `reusable-build.yml`
  issues: write

jobs:
  release_canary:
    name: Release Canary
    if: ${{ github.repository == 'web-infra-dev/rspack' }}
    uses: ./.github/workflows/reusable-release-npm.yml
    with:
      release_type: canary
      ref: ${{ inputs.commit || github.sha }}
      profile: ${{ inputs.profile || 'release' }}
      test: ${{ inputs.test || false }}
      tag: latest
      tag_confirm: latest
      dry_run: false
      push_tags: false
