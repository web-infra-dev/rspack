name: Reusable Release Crates

on:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        description: 'DryRun release'
        required: true
        default: false
      push_tags:
        type: boolean
        description: 'Push tags to repository'
        required: true
        default: true

jobs:
  rust_tests:
    name: Run Rust Tests
    uses: ./.github/workflows/reusable-rust-test.yml
    with:
      # Use separated strategy to check all crates
      cargo-check-strategy: 'separated'

  release_crates:
    environment: crate
    name: Release Crates
    permissions:
      contents: write
      id-token: write
    runs-on: ${{ fromJSON(vars.LINUX_SELF_HOSTED_RUNNER_LABELS ||  '"ubuntu-22.04"') }}
    needs: [rust_tests]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-if: true
          key: release

      - uses: cargo-bins/cargo-binstall@0b24824336e2b3800b0f89d9e08b2c08bfa3dcdd # v1.17.9

      - name: Install cargo-workspaces
        run: cargo binstall --no-confirm cargo-workspaces@0.4.0 --force

      - name: Pnpm Setup
        uses: ./.github/actions/pnpm/setup

      - name: Pnpm Install
        run: pnpm i

      - name: Run Cargo codegen
        run: cargo codegen

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish Crates
        run: |
          ./x crate-publish --token $CARGO_REGISTRY_TOKEN ${{ inputs.dry_run && '--dry-run' || '' }} ${{ inputs.push_tags && '--push-tags' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
