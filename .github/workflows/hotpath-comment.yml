name: hotpath-comment

on:
  workflow_run:
    workflows: [hotpath-profile]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.repository == 'web-infra-dev/rspack' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download hotpath benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          name: hotpath-benchmark-results
          path: hotpath-benchmark-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose comment body
        id: compose
        shell: bash
        run: |
          PR_NUMBER="$(cat hotpath-benchmark-results/pr_number.txt)"
          if [ -z "$PR_NUMBER" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="$(cat hotpath-benchmark-results/base_sha.txt)"
          HEAD_SHA="$(cat hotpath-benchmark-results/head_sha.txt)"
          BENCHMARK_DIR="$(cat hotpath-benchmark-results/benchmark_dir.txt)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          DIFF_LINES=120
          TOTAL_LINES="$(wc -l < hotpath-benchmark-results/diff.txt | tr -d ' ')"

          {
            echo "skip=false"
            echo "pr_number=$PR_NUMBER"
            echo 'body<<EOF'
            echo '## 🧪 Hotpath Benchmark'
            echo '<!-- hotpath-benchmark -->'
            echo
            echo "> Comparing \`${BASE_SHA:0:7}\` -> \`${HEAD_SHA:0:7}\` on \`${BENCHMARK_DIR}\`"
            echo "> Workflow run: [Open](${RUN_URL})"
            echo
            echo '<details><summary>bench-diff</summary>'
            echo
            echo '```text'
            sed -n "1,${DIFF_LINES}p" hotpath-benchmark-results/diff.txt
            if [ "$TOTAL_LINES" -gt "$DIFF_LINES" ]; then
              echo
              echo "... truncated ${TOTAL_LINES} line diff, see workflow artifact for the full output ..."
            fi
            echo '```'
            echo
            echo '</details>'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        if: steps.compose.outputs.skip != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          COMMENT_BODY: ${{ steps.compose.outputs.body }}
          PR_NUMBER: ${{ steps.compose.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- hotpath-benchmark -->';
            const issueNumber = Number(process.env.PR_NUMBER);
            const body = process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
