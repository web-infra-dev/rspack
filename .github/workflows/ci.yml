name: CI

on:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - v1.x
    paths-ignore:
      - '**/*.md'
      - 'website/**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' && github.ref_name != 'v1.x' }}

permissions:
  # Allow commenting on issues for `reusable-build.yml`
  issues: write
  # Allow commenting on pull requests for `size-limit.yml`
  pull-requests: write

jobs:
  check-changed:
    runs-on: ubuntu-latest
    name: Check Source Changed
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed == 'true' }}
      document_changed: ${{ steps.filter.outputs.document_changed == 'true' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code_changed:
              - "!**/*.md"
              - "!**/*.mdx"
              - "!website/**"
            document_changed:
              - "website/**"

  test-linux:
    name: Test Linux
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name != 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: x86_64-unknown-linux-gnu
      profile: 'ci'
      runner: ${{ vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"' }}
      test: true
      bench: true
      prefer_docker: false
      test-runner: '"ubuntu-22.04"'
      bench-runner: '"ubuntu-22.04"'

  test-windows:
    name: Test Windows
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name != 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: x86_64-pc-windows-msvc
      profile: 'dev'
      runner: ${{ vars.WINDOWS_SELF_HOSTED_RUNNER_LABELS || '"windows-latest"' }}
      test-runner: '"windows-latest"'
      test: true

  test-mac:
    name: Test Mac ARM64
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name != 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: aarch64-apple-darwin
      profile: 'ci'
      runner: ${{ vars.MAC_SELF_HOSTED_RUNNER_LABELS || '"macos-latest"' }}
      test-runner: ${{ '"macos-latest"' }}
      test: true

  test-wasm:
    name: Test WASM
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name != 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: wasm32-wasip1-threads
      profile: 'ci'
      runner: ${{ vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"' }}
      test: true

  check-codspeed:
    name: Check Bench Result
    needs: [test-linux]
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Polling Comment
        if: ${{ github.event_name == 'pull_request' }}
        run: bash .github/actions/codspeed/check-comment.sh

  check-cache:
    name: Check Cache Portable
    needs: [test-linux, test-windows]
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ${{ fromJSON(vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          key: test_cache
          save-if: true
      - name: Download linux cache
        uses: ./.github/actions/artifact/download
        with:
          name: testCase-persistentCache-linux
          path: ./cache-linux
          force-use-github: true
      - name: Download windows cache
        uses: ./.github/actions/artifact/download
        with:
          name: testCase-persistentCache-windows
          path: ./cache-windows
          force-use-github: true
      - name: Run compare kit
        run: |
          echo "success"
          #  TODO open it after rspack portable cache implementation
          # cargo run -p rspack_tools -- compare ./cache-linux ./cache-windows

  hotpath-benchmark:
    name: Hotpath Benchmark
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && github.repository == 'web-infra-dev/rspack' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    continue-on-error: true
    env:
      BENCHMARK_DIR: examples/basic
      METRICS_DIR: ${{ github.workspace }}/.hotpath-metrics
    steps:
      - name: Resolve benchmark context
        id: hotpath-context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('base_sha', context.payload.pull_request.base.sha);
              core.setOutput('head_sha', context.payload.pull_request.head.sha);
              core.setOutput('pr_number', String(context.payload.pull_request.number));
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
              per_page: 1,
            });

            if (prs.length === 0) {
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${repo.default_branch}`,
              });
              core.setOutput('base_sha', ref.object.sha);
              core.setOutput('head_sha', context.sha);
              core.setOutput('pr_number', '');
              return;
            }

            const pr = prs[0];
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', context.sha);
            core.setOutput('pr_number', String(pr.number));

      - name: Checkout head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.hotpath-context.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Pnpm
        uses: ./.github/actions/pnpm/setup
        with:
          node-version: 24

      - name: Setup Rust
        uses: ./.github/actions/rustup
        with:
          key: hotpath_profile
          save-if: true

      - name: Run hotpath benchmark
        shell: bash
        run: |
          bash .github/scripts/run-hotpath-benchmark.sh "${{ steps.hotpath-context.outputs.base_sha }}" "$METRICS_DIR" "$BENCHMARK_DIR"

      - name: Run bench-diff
        shell: bash
        run: |
          cargo xtask bench-diff "$METRICS_DIR/base.json" "$METRICS_DIR/head.json" | tee "$METRICS_DIR/diff.txt"

      - name: Upload hotpath benchmark artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hotpath-benchmark-${{ github.event.pull_request.number }}
          path: ${{ env.METRICS_DIR }}
          retention-days: 7

      - name: Compose PR comment
        id: comment
        if: ${{ success() && steps.hotpath-context.outputs.pr_number != '' }}
        shell: bash
        run: |
          BASE_SHA="${{ steps.hotpath-context.outputs.base_sha }}"
          HEAD_SHA="${{ steps.hotpath-context.outputs.head_sha }}"
          PR_NUMBER="${{ steps.hotpath-context.outputs.pr_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DIFF_LINES=120
          TOTAL_LINES="$(wc -l < "$METRICS_DIR/diff.txt" | tr -d ' ')"

          {
            echo "pr_number=$PR_NUMBER"
            echo 'body<<EOF'
            echo '## 🧪 Hotpath Benchmark'
            echo '<!-- hotpath-benchmark -->'
            echo
            echo "> Comparing \`${BASE_SHA:0:7}\` -> \`${HEAD_SHA:0:7}\` on \`${BENCHMARK_DIR}\`"
            echo "> Workflow run: [Open](${RUN_URL})"
            echo
            echo '<details><summary>bench-diff</summary>'
            echo
            echo '```text'
            sed -n "1,${DIFF_LINES}p" "$METRICS_DIR/diff.txt"
            if [ "$TOTAL_LINES" -gt "$DIFF_LINES" ]; then
              echo
              echo "... truncated ${TOTAL_LINES} line diff, see workflow artifact for the full output ..."
            fi
            echo '```'
            echo
            echo '</details>'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        if: ${{ success() && steps.hotpath-context.outputs.pr_number != '' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          COMMENT_BODY: ${{ steps.comment.outputs.body }}
          PR_NUMBER: ${{ steps.comment.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- hotpath-benchmark -->';
            const issueNumber = Number(process.env.PR_NUMBER);
            const body = process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

  test_required_check:
    # this job will be used for GitHub actions to determine required job success or not;
    # When code changed, it will check if any of the test jobs failed.
    # When *only* doc changed, it will run as success directly
    name: Test Required Check
    needs:
      [
        check-codspeed,
        test-linux,
        test-windows,
        test-mac,
        test-wasm,
        check-changed,
        size-limit,
        check-cache,
      ]
    if: ${{ github.event_name != 'workflow_dispatch' && always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Log
        run: echo ${{ join(needs.*.result, ',') }}
      - name: Test check
        if: ${{ needs.check-changed.outputs.code_changed == 'true'
          && github.event_name == 'pull_request'
          && join(needs.*.result, ',')!='success,success,success,success,success,success,success,success' }}
        run: echo "Tess Failed" && exit 1

      - name: Test check
        if: ${{ needs.check-changed.outputs.code_changed == 'true'
          && github.event_name != 'pull_request'
          && join(needs.*.result, ',')!='success,success,success,success,success,success,skipped,success' }}
        run: echo "Tess Failed" && exit 1

      - name: No check to Run test
        run: echo "Success"

  size-limit:
    name: Binary Size Limit
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name == 'pull_request' }}
    uses: ./.github/workflows/size-limit.yml

