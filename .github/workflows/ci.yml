name: CI

on:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
      upload_artifact:
        description: Upload full report as artifact (optional)
        required: false
        type: boolean
        default: false
      dump_sysctl_all:
        description: Dump `sysctl -a` (large output)
        required: false
        type: boolean
        default: false
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - v1.x
    paths-ignore:
      - '**/*.md'
      - 'website/**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' && github.ref_name != 'v1.x' }}

permissions:
  # Allow commenting on issues for `reusable-build.yml`
  issues: write
  # Allow commenting on pull requests for `size-limit.yml`
  pull-requests: write

jobs:
  probe-github-runner:
    name: Probe github ubuntu-22.04
    runs-on: ubuntu-22.04
    steps:
      - name: Probe runner environment
        shell: bash
        run: |
          set -euo pipefail

          REPORT=runner-env.txt
          if [ "${{ inputs.upload_artifact }}" = "true" ]; then
            exec > >(tee "$REPORT") 2>&1
          fi

          section() {
            printf '\n===== %s =====\n' "$1"
          }

          section "basic"
          date
          echo "runner=${{ inputs.runner }}"
          uname -a
          cat /etc/os-release || true

          section "current user"
          id
          echo "user=$(id -un || true)"
          echo "uid=$(id -u || true) gid=$(id -g || true)"
          groups || true
          echo "HOME=$HOME"
          echo "SHELL=${SHELL:-<unset>}"
          echo "PATH=$PATH"

          section "passwd/group entries"
          if command -v getent >/dev/null 2>&1; then
            getent passwd "$(id -un)" || true
            getent group "$(id -gn)" || true
          else
            grep -E "^$(id -un):" /etc/passwd || true
            grep -E "^$(id -gn):" /etc/group || true
          fi

          section "sudo"
          if command -v sudo >/dev/null 2>&1; then
            if sudo -n true 2>/dev/null; then
              echo "sudo: ok (passwordless)"
              sudo -n -l 2>/dev/null || true
            else
              echo "sudo: not available"
            fi
          else
            echo "sudo: <not installed>"
          fi

          section "hardware"
          command -v lscpu >/dev/null 2>&1 && lscpu || true
          nproc || true
          free -h || true
          df -h || true

          section "limits"
          ulimit -a || true

          section "bpf sysctl (user)"
          for f in \
            /proc/sys/kernel/unprivileged_bpf_disabled \
            /proc/sys/kernel/perf_event_paranoid \
            /proc/sys/kernel/kptr_restrict \
            /proc/sys/kernel/dmesg_restrict \
            /proc/sys/net/core/bpf_jit_enable \
            /proc/sys/net/core/bpf_jit_kallsyms \
            /proc/sys/net/core/bpf_jit_harden
          do
            if [ -f "$f" ]; then
              echo "$f=$(cat "$f")"
            else
              echo "$f=<missing>"
            fi
          done

          section "process security (user)"
          grep -E '^(NoNewPrivs|Seccomp|CapEff|CapBnd):' /proc/self/status || true

          section "KVM/virt"
          command -v systemd-detect-virt >/dev/null 2>&1 && systemd-detect-virt || true
          echo "cpu flags (vmx/svm):"
          grep -m1 -E 'vmx|svm' /proc/cpuinfo || true
          echo "/dev/kvm:"
          ls -l /dev/kvm 2>/dev/null || echo "/dev/kvm: <missing or no access>"
          command -v lsmod >/dev/null 2>&1 && lsmod | grep -E '^kvm(_intel|_amd)?\b' || true

          section "kernel btf & tracefs (root)"
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -E bash -c '
              set -euo pipefail
              echo "[root] id=$(id)"
              echo "[root] uname=$(uname -a)"
              echo "[root] /sys/kernel/btf/vmlinux:"; ls -l /sys/kernel/btf/vmlinux || true
              echo "[root] mounts(tracefs/debugfs):"; grep -E "tracefs|debugfs" /proc/mounts || true
              echo "[root] /sys/kernel/tracing:"; ls -l /sys/kernel/tracing || true
              echo "[root] sched_process_fork id:"; ls -l /sys/kernel/tracing/events/sched/sched_process_fork/id || true
              echo "[root] status caps/seccomp:"; grep -E "^(NoNewPrivs|Seccomp|CapEff|CapBnd):" /proc/self/status || true

              if command -v bpftool >/dev/null 2>&1; then
                echo "[root] bpftool version:"; bpftool version || true
                echo "[root] bpftool feature probe kernel:"; bpftool feature probe kernel || true
              else
                echo "[root] bpftool: <not installed>"
              fi
            '
          else
            echo "sudo: not available, skip root checks"
          fi

          if [ "${{ inputs.dump_sysctl_all }}" = "true" ]; then
            section "sysctl -a (root, large output)"
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -E sysctl -a 2>/dev/null || true
            else
              sysctl -a 2>/dev/null || true
            fi
          fi

  probe-self-runner:
    name: Probe self ubuntu-22.04
    runs-on: rspack-ubuntu-22.04-physical-large
    steps:
      - name: Probe runner environment
        shell: bash
        run: |
          set -euo pipefail

          REPORT=runner-env.txt
          if [ "${{ inputs.upload_artifact }}" = "true" ]; then
            exec > >(tee "$REPORT") 2>&1
          fi

          section() {
            printf '\n===== %s =====\n' "$1"
          }

          section "basic"
          date
          echo "runner=${{ inputs.runner }}"
          uname -a
          cat /etc/os-release || true

          section "current user"
          id
          echo "user=$(id -un || true)"
          echo "uid=$(id -u || true) gid=$(id -g || true)"
          groups || true
          echo "HOME=$HOME"
          echo "SHELL=${SHELL:-<unset>}"
          echo "PATH=$PATH"

          section "passwd/group entries"
          if command -v getent >/dev/null 2>&1; then
            getent passwd "$(id -un)" || true
            getent group "$(id -gn)" || true
          else
            grep -E "^$(id -un):" /etc/passwd || true
            grep -E "^$(id -gn):" /etc/group || true
          fi

          section "sudo"
          if command -v sudo >/dev/null 2>&1; then
            if sudo -n true 2>/dev/null; then
              echo "sudo: ok (passwordless)"
              sudo -n -l 2>/dev/null || true
            else
              echo "sudo: not available"
            fi
          else
            echo "sudo: <not installed>"
          fi

          section "hardware"
          command -v lscpu >/dev/null 2>&1 && lscpu || true
          nproc || true
          free -h || true
          df -h || true

          section "limits"
          ulimit -a || true

          section "bpf sysctl (user)"
          for f in \
            /proc/sys/kernel/unprivileged_bpf_disabled \
            /proc/sys/kernel/perf_event_paranoid \
            /proc/sys/kernel/kptr_restrict \
            /proc/sys/kernel/dmesg_restrict \
            /proc/sys/net/core/bpf_jit_enable \
            /proc/sys/net/core/bpf_jit_kallsyms \
            /proc/sys/net/core/bpf_jit_harden
          do
            if [ -f "$f" ]; then
              echo "$f=$(cat "$f")"
            else
              echo "$f=<missing>"
            fi
          done

          section "process security (user)"
          grep -E '^(NoNewPrivs|Seccomp|CapEff|CapBnd):' /proc/self/status || true

          section "KVM/virt"
          command -v systemd-detect-virt >/dev/null 2>&1 && systemd-detect-virt || true
          echo "cpu flags (vmx/svm):"
          grep -m1 -E 'vmx|svm' /proc/cpuinfo || true
          echo "/dev/kvm:"
          ls -l /dev/kvm 2>/dev/null || echo "/dev/kvm: <missing or no access>"
          command -v lsmod >/dev/null 2>&1 && lsmod | grep -E '^kvm(_intel|_amd)?\b' || true

          section "kernel btf & tracefs (root)"
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -E bash -c '
              set -euo pipefail
              echo "[root] id=$(id)"
              echo "[root] uname=$(uname -a)"
              echo "[root] /sys/kernel/btf/vmlinux:"; ls -l /sys/kernel/btf/vmlinux || true
              echo "[root] mounts(tracefs/debugfs):"; grep -E "tracefs|debugfs" /proc/mounts || true
              echo "[root] /sys/kernel/tracing:"; ls -l /sys/kernel/tracing || true
              echo "[root] sched_process_fork id:"; ls -l /sys/kernel/tracing/events/sched/sched_process_fork/id || true
              echo "[root] status caps/seccomp:"; grep -E "^(NoNewPrivs|Seccomp|CapEff|CapBnd):" /proc/self/status || true

              if command -v bpftool >/dev/null 2>&1; then
                echo "[root] bpftool version:"; bpftool version || true
                echo "[root] bpftool feature probe kernel:"; bpftool feature probe kernel || true
              else
                echo "[root] bpftool: <not installed>"
              fi
            '
          else
            echo "sudo: not available, skip root checks"
          fi

          if [ "${{ inputs.dump_sysctl_all }}" = "true" ]; then
            section "sysctl -a (root, large output)"
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -E sysctl -a 2>/dev/null || true
            else
              sysctl -a 2>/dev/null || true
            fi
          fi
  check-changed:
    runs-on: rspack-ubuntu-22.04-mini
    name: Check Source Changed
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed == 'true' }}
      document_changed: ${{ steps.filter.outputs.document_changed == 'true' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code_changed:
              - "!**/*.md"
              - "!**/*.mdx"
              - "!website/**"
            document_changed:
              - "website/**"

  test-linux:
    name: Test Linux
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: x86_64-unknown-linux-gnu
      profile: 'ci'
      runner: ${{ vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"' }}
      test: true
      bench: true
      test-runner: '"ubuntu-22.04"'
      bench-runner: '"ubuntu-22.04"'

  test-windows:
    name: Test Windows
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: x86_64-pc-windows-msvc
      profile: 'ci'
      runner: ${{ vars.WINDOWS_SELF_HOSTED_RUNNER_LABELS || '"windows-latest"' }}
      test-runner: '"windows-latest"'
      test: true

  test-mac:
    name: Test Mac ARM64
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: aarch64-apple-darwin
      profile: 'ci'
      runner: ${{ vars.MAC_SELF_HOSTED_RUNNER_LABELS || '"macos-latest"' }}
      test-runner: ${{ '"macos-latest"' }}
      test: true

  test-wasm:
    name: Test WASM
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      target: wasm32-wasip1-threads
      profile: 'ci'
      runner: ${{ vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"' }}
      test-runner: ${{ vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"' }}
      test: true

  check-codspeed:
    name: Check Bench Result
    needs: [test-linux]
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Polling Comment
        if: ${{ github.event_name == 'pull_request' }}
        run: bash .github/actions/codspeed/check-comment.sh

  check-cache:
    name: Check Cache Portable
    needs: [test-linux, test-windows]
    runs-on: ${{ fromJSON(vars.LINUX_SELF_HOSTED_RUNNER_LABELS || '"ubuntu-22.04"') }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          key: test_cache
          save-if: true
      - name: Download linux cache
        uses: ./.github/actions/artifact/download
        with:
          name: testCase-persistentCache-linux
          path: ./cache-linux
          force-use-github: true
      - name: Download windows cache
        uses: ./.github/actions/artifact/download
        with:
          name: testCase-persistentCache-windows
          path: ./cache-windows
          force-use-github: true
      - name: Run compare kit
        run: |
          echo "success"
          #  TODO open it after rspack portable cache implementation
          # cargo run -p rspack_tools -- compare ./cache-linux ./cache-windows

  test_required_check:
    # this job will be used for GitHub actions to determine required job success or not;
    # When code changed, it will check if any of the test jobs failed.
    # When *only* doc changed, it will run as success directly
    name: Test Required Check
    needs:
      [
        check-codspeed,
        test-linux,
        test-windows,
        test-mac,
        test-wasm,
        check-changed,
        size-limit,
        check-cache,
      ]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Log
        run: echo ${{ join(needs.*.result, ',') }}
      - name: Test check
        if: ${{ needs.check-changed.outputs.code_changed == 'true'
          && github.event_name == 'pull_request'
          && join(needs.*.result, ',')!='success,success,success,success,success,success,success,success' }}
        run: echo "Tess Failed" && exit 1

      - name: Test check
        if: ${{ needs.check-changed.outputs.code_changed == 'true'
          && github.event_name != 'pull_request'
          && join(needs.*.result, ',')!='success,success,success,success,success,success,skipped,success' }}
        run: echo "Tess Failed" && exit 1

      - name: No check to Run test
        run: echo "Success"

  size-limit:
    name: Binary Size Limit
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.code_changed == 'true' && github.event_name == 'pull_request' }}
    uses: ./.github/workflows/size-limit.yml

